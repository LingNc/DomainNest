<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="tree" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Domain tree structure -->
  <!-- Root node -->
  <circle cx="256" cy="140" r="32" fill="url(#tree)"/>
  <!-- Lines to children -->
  <line x1="256" y1="172" x2="256" y2="220" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="220" x2="156" y2="220" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="220" x2="356" y2="220" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <!-- Child nodes -->
  <circle cx="156" cy="260" r="24" fill="url(#tree)"/>
  <circle cx="356" cy="260" r="24" fill="url(#tree)"/>
  <!-- Lines to grandchildren -->
  <line x1="156" y1="284" x2="156" y2="320" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="156" y1="320" x2="106" y2="320" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="156" y1="320" x2="206" y2="320" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="356" y1="284" x2="356" y2="320" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="356" y1="320" x2="306" y2="320" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="356" y1="320" x2="406" y2="320" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <!-- Grandchild nodes -->
  <circle cx="106" cy="352" r="18" fill="url(#tree)" opacity="0.85"/>
  <circle cx="206" cy="352" r="18" fill="url(#tree)" opacity="0.85"/>
  <circle cx="306" cy="352" r="18" fill="url(#tree)" opacity="0.85"/>
  <circle cx="406" cy="352" r="18" fill="url(#tree)" opacity="0.85"/>
  <!-- Nest / shield icon overlay at root -->
  <path d="M256 108 L236 120 L236 140 C236 152 244 160 256 164 C268 160 276 152 276 140 L276 120 Z" fill="#4f46e5" opacity="0.6"/>
  <!-- Bottom text area - small dots representing records -->
  <circle cx="200" cy="420" r="6" fill="#ffffff" opacity="0.3"/>
  <circle cx="230" cy="420" r="6" fill="#ffffff" opacity="0.3"/>
  <circle cx="260" cy="420" r="6" fill="#ffffff" opacity="0.3"/>
  <circle cx="290" cy="420" r="6" fill="#ffffff" opacity="0.3"/>
  <circle cx="320" cy="420" r="6" fill="#ffffff" opacity="0.3"/>
</svg>
